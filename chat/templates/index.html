<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
   
        header { background: #075e54; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        header a { color: #dcf8c6; text-decoration: none; font-weight: bold; }


        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column-reverse; } 
        
        .message { background: white; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; max-width: 70%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); align-self: flex-start; }
        .message.mine { align-self: flex-end; background: #dcf8c6; } 
        
        .username { display: block; font-weight: bold; font-size: 0.8em; color: #075e54; margin-bottom: 5px; }
        .timestamp { display: block; font-size: 0.7em; color: #999; margin-top: 5px; text-align: right; }
        .delete-btn { background: none; border: none; color: #ff4d4d; font-size: 0.7em; cursor: pointer; padding: 0; margin-top: 4px; display: block; text-align: right; }
        .delete-btn:hover { background: none; color: #cc0000; }

        footer { background: white; padding: 15px; border-top: 1px solid #ddd; }
        form { display: flex; gap: 10px; max-width: 1000px; margin: 0 auto; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #128c7e; }
    </style>
</head>
<body>

<header>
    <span>Logged in as: <b>{{ current_user }}</b></span>
    <a href="{{ url_for('logout') }}">Logout</a>
</header>

<div id="chat-container">
    {% for msg in chat_history %}
        <div class="message {% if msg.username == current_user %}mine{% endif %}">
            <span class="username">{{ msg.username }}</span>
            {{ msg.content }}
            <span class="timestamp">{{ msg.timestamp.strftime('%H:%M') }}</span>
            {% if msg.username == current_user %}
            <form method="post" style="margin:0">
                <input type="hidden" name="delete_id" value="{{ msg.id }}">
                <button type="submit" name="action" value="delete" class="delete-btn"> Delete</button>
            </form>
            {% endif %}
        </div>
    {% endfor %}
</div>

<footer>
    <div style="display:flex; gap:10px; max-width:1000px; margin:0 auto;">
        <input type="text" id="msg-input" placeholder="Write a message..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
</footer>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
    const socket = io({ transports: ['websocket', 'polling'] });
    const currentUser = "{{ current_user }}";

    socket.on('new_message', (data) => {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = 'message' + (data.username === currentUser ? ' mine' : '');
        div.innerHTML = `
            <span class="username">${data.username}</span>
            ${data.message}
            <span class="timestamp">${data.timestamp}</span>
        `;
        container.prepend(div);
    });

    function sendMessage() {
        const input = document.getElementById('msg-input');
        const content = input.value.trim();
        if (!content) return;
        socket.emit('send_message', { content: content });
        input.value = '';
    }

    document.getElementById('msg-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
